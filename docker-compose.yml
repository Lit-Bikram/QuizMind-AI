services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-mcq-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./ai-mcq-frontend
      dockerfile: Dockerfile
    container_name: ai-mcq-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./ai-mcq-frontend/.env
    volumes:
      - ./ai-mcq-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0